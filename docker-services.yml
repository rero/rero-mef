services:
  app:
    build:
      context: ./
      args:
        - ENVIRONMENT=DEV
    image: rero-mef
    environment:
      - "INVENIO_ACCOUNTS_SESSION_REDIS_URL=redis://cache:6379/1"
      - "INVENIO_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CACHE_REDIS_URL=redis://cache:6379/0"
      - "INVENIO_CACHE_TYPE=redis"
      - "INVENIO_CELERY_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CELERY_RESULT_BACKEND=redis://cache:6379/2"
      - "INVENIO_SEARCH_HOSTS=['os:9200']"
      - "INVENIO_SECRET_KEY=CHANGE_ME"
      - "INVENIO_SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://rero-mef:rero-mef@db/rero-mef"
      - "INVENIO_WSGI_PROXIES=2"
      - "INVENIO_RATELIMIT_STORAGE_URI=redis://cache:6379/3"
  lb:
    build: ./docker/haproxy/
    image: rero-mef-lb
    restart: "unless-stopped"
    ports:
      - "80"
      - "443"
      - "8080:8080"
  frontend:
    build: ./docker/nginx/
    image: rero-mef-frontend
    restart: "unless-stopped"
    ports:
      - "80"
      - "443"
  cache:
    image: redis:8
    restart: "unless-stopped"
    read_only: true
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
  db:
    image: postgres:18-alpine
    restart: "unless-stopped"
    environment:
      - "POSTGRES_USER=rero-mef"
      - "POSTGRES_PASSWORD=rero-mef"
      - "POSTGRES_DB=rero-mef"
    ports:
      - "5432:5432"
  mq:
    image: rabbitmq:4-management
    restart: "unless-stopped"
    ports:
      - "15672:15672"
      - "5672:5672"
  os:
    image: opensearchproject/opensearch:2
    restart: "unless-stopped"
    environment:
      - "bootstrap.memory_lock=true"
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=Str@wberry_77!"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 2g
    ports:
      - "9200:9200"
      - "9300:9300"
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.16.0
    environment:
      - "OPENSEARCH_HOSTS=http://os:9200"
      - "SERVER_HOST=0.0.0.0"
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
    ports: ['5601:5601']
  flower:
    image: mher/flower
    restart: "unless-stopped"
    depends_on:
      - mq
    environment:
      - "CELERY_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "FLOWER_BROKER_API=http://guest:guest@mq:15672/api/"
    ports:
      - "5555:5555"
