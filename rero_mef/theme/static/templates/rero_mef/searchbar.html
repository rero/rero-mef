<form class="mef-searchbar-form" role="search">
  <div class="input-group mef-searchbar-group">
    <input
      type="text"
      class="form-control"
      placeholder="{{placeholder}}"
      ng-model="vm.userQuery"
      ng-model-options="{ debounce: { 'default': 500, 'blur': 0 } }"
      ng-keyup="$event.keyCode == 13 && updateQuery()"
      autofocus
    >
    <div class="input-group-btn">
      <button ng-click="updateQuery()" type="submit" class="btn btn-default" aria-label="Search">
        <i class="fa fa-search" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</form>
