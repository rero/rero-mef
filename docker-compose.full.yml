#
# This file is an example of what an Invenio production environment would look like.
# Here you can find a HAProxy load balancer which redirects the traffic to the web frontend, based on nginx.
# UI application and REST API are separate.
# There are also a celery worker backend, which can be monitored using Flower, and basics services such as
# a Redis cache, a database, a message broker (RabbitMQ) and OpenSearch.
#
services:
  # Load balancer
  lb:
    extends:
      file: docker-services.yml
      service: lb
    links:
      - frontend
  # Frontend
  frontend:
    extends:
      file: docker-services.yml
      service: frontend
    volumes:
      - static_data:/invenio/var/instance/static
    links:
      - web-ui
      - web-api
  # UI Application
  web-ui:
    extends:
      file: docker-services.yml
      service: app
    command: uv run uwsgi /invenio/var/instance/uwsgi_ui.ini
    image: rero-mef-web-ui
    ports:
      - "5000"
    volumes:
      - static_data:/invenio/var/instance/static
    links:
      - cache
      - os
      - mq
      - db
  # API Rest Application
  web-api:
    extends:
      file: docker-services.yml
      service: app
    command: uv run uwsgi /invenio/var/instance/uwsgi_rest.ini
    image: rero-mef-web-api
    ports:
      - "5001"
    volumes:
      - static_data:/invenio/var/instance/static
    links:
      - cache
      - os
      - mq
      - db
  # Worker
  worker:
    extends:
      file: docker-services.yml
      service: app
    restart: "always"
    command: "uv run celery -A rero_mef.celery worker --loglevel=INFO"
    image: rero-mef-worker
    links:
      - cache
      - os
      - mq
      - db
  # Beat
  beat:
    extends:
      file: docker-services.yml
      service: app
    restart: "always"
    command: "uv run celery -A rero_mef.celery beat --loglevel=INFO"
    image: rero-ils-beat
    links:
      - cache
      - os
      - mq
      - db
  # Monitoring
  flower:
    extends:
      file: docker-services.yml
      service: flower
    links:
      - mq
  # Base services
  cache:
    extends:
      file: docker-services.yml
      service: cache
  db:
    extends:
      file: docker-services.yml
      service: db
  mq:
    extends:
      file: docker-services.yml
      service: mq
  os:
    extends:
      file: docker-services.yml
      service: os
volumes:
  static_data:
