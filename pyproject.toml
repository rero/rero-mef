# ---------------------------------------------------------------------------
# Build system
# ---------------------------------------------------------------------------

[build-system]
requires = ["uv_build<1.0.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "."

[tool.uv]
package = true

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------

[project]
name = "rero-mef"
version = "0.17.0"
description = "Invenio digital library framework MEF."
authors = [{name = "RERO+", email = "software@rero.ch"}]
keywords = ["rero-mef", "invenio", "multilingual entity file"]
license = "AGPL-3.0-or-later"
urls = {homepage = "https://www.rero.ch/en/products/mef", repository="https://github.com/rero/rero-mef"}
requires-python = ">= 3.14,<3.15"

dependencies = [
    ## Third party invenio modules used by RERO ILS
    "invenio-oaiharvester @ git+https://github.com/inveniosoftware/invenio-oaiharvester.git@v1.0.0a4",
    "invenio-search[elasticsearch7]>=3.0.0",
    # Invenio core modules
    "invenio-app>=3.0.0",
    "invenio-base>=2.0.0",
    "invenio-celery>=2.0.0",
    "invenio-config>=1.0.3",
    "invenio-db [postgresql]>=2.0.0",
    # Invenio base bundle
    "invenio-assets>=4.0.0",
    "invenio-formatter>=3.0.0",
    "invenio-logging[sentry]>=4.0.0",
    "invenio-rest>=3.0.0",
    "invenio-theme>=4.0.0",
    # Invenio auth bundle
    "invenio-access>=4.0.0",
    "invenio-accounts>=6.0.0",
    "invenio-oauth2server>=3.0.0",
    # Invenio metadata bundle
    "invenio-indexer>=4.0.0",
    "invenio-jsonschemas>=2.0.0",
    "invenio-pidstore>=3.0.0",
    "invenio-records-rest>=3.0.0",
    "invenio-records-ui>=2.0.0",
    "invenio-records>=4.0.0",
    "invenio-search-ui>=4.0.0",
    "python-dotenv >=0.13.0",
    ## MEF specific python modules
    "PyYAML>=5.3.1",
    "ijson>=2.5.1",
    "poethepoet",
    # problem with marcxml `leader`
    "pymarc<5.2.0",
    "sqlitedict>=2.1.0",
    "rero-invenio-base>=1.1.0",
    "dojson>=1.7.0"
]

[dependency-groups]
dev = [
    ## Default from Invenio
    "pytest-invenio>=3.0.0",
    "coveralls>=4.0.1",
    "Flask-Debugtoolbar>=0.10.1",
    ## RERO ILS specific python packages
    "pip-audit (>=2.8.0,<3.0.0)",
    "ruff>=0.12.5",
    "pytest-ruff>=0.5",
    "mock>=2.0.0",
    "python-semantic-release>=10.5.3",

]
prod = [
    "uwsgi>=2.0.30",
    "uwsgitop>=0.11"
]

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------

[project.entry-points."app.console_scripts"]
rero-ils = "invenio_app.cli:cli"

[project.entry-points."invenio_celery.tasks"]
