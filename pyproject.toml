celery = "rero_mef.cli:celery"
agents = "rero_mef.agents.cli:agents"
monitoring = "rero_mef.monitoring.cli:monitoring"


[tool.poe.tasks]
bootstrap = {cmd = "./scripts/bootstrap", help = "Runs bootstrap"}
console = {cmd = "./scripts/console", help = "Opens invenio shell"}
format =  {cmd = "ruff format .", help = "Formats all files"}
lint = {cmd = "ruff check", help = "Checks linting"}
server = {cmd = "./scripts/server", help = "Starts the server "}
setup = {cmd = "./scripts/setup", help = "Runs setup"}
update = {cmd = "./scripts/update", help = "Runs update"}
run_tests = {cmd = "./scripts/test", help = "Runs all tests"}
tests = {cmd = "pytest", help = "pytest"}
tests_debug = {cmd = "pytest -s -vv --no-cov", help = "pytest -s -vv --no-cov"}

# Release management
[tool.poe.tasks.changelog]
cmd = "semantic-release changelog"
help = "Preview the next changelog without making changes"

[tool.poe.tasks.version]
cmd = "semantic-release version --print"
help = "Print the next version number without making changes"

[tool.poe.tasks.release]
cmd = "semantic-release version --no-push --no-tag --no-commit"
help = "Generate changelog and bump version locally (does not push, tag, or commit - for local testing only)"

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
tag_format = "v{version}"
commit_message = "chore(release): v{version}"
build_command = """
    uv lock --upgrade-package rero-mef
    git add uv.lock
"""
allow_zero_version = false

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "chore", "docs", "style", "refactor", "test", "build", "ci"]

[tool.semantic_release.changelog]
exclude_commit_patterns = [
    "chore\\(release\\):.*",
]
mode = "update"

[tool.semantic_release.branches.staging]
match = "staging"
prerelease = false

[tool.pytest.ini_options]
live_server_scope = "module"
addopts = "--color=yes --doctest-modules --exclude-warning-annotations --ignore=setup.py"
testpaths = "tests rero_mef"
# not displaying all the PendingDeprecationWarnings from invenio
filterwarnings = "ignore::PendingDeprecationWarning"

[tool.ruff]
extend-exclude = ["config.py"]

[tool.ruff.lint]
extend-select = ["A", "C4", "INT", "ISC", "T20", "PIE", "Q", "RET", "SIM", "I", "N", "PERF", "W", "D", "F", "UP", "RUF"]
ignore = ["D103", "D105", "D107", "D401", "N818", "PERF203", "PERF401", "RUF012", "RUF059", "SIM102", "SIM115"]

[tool.ruff.lint.per-file-ignores]
"rero_mef/alembic/*.py" = ["N999"]
"tests/**/*.py" = ["ARG001"]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.coverage.run]
relative_files = true
omit = [
    "rero_mef/cli.py",
    # filter.py builds Elasticsearch DSL callables; testing requires a live ES
    # cluster and is covered implicitly through integration tests in config.py.
    "rero_mef/filter.py",
    "rero_mef/alembic/*",
    "rero_mef/jsonschemas/*",
    "rero_mef/marctojson/logger.py",
    "rero_mef/marctojson/helper.py",
    "rero_mef/marctojson/records.py",
    "rero_mef/marctojson/do_skeleton.py",
]

[tool.coverage.report]
precision = 2

