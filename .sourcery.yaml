# Sourcery configuration for rero-mef
# Align with Ruff rules to prevent conflicts

ignore:
  - "rero_mef/config.py"
  - "rero_mef/alembic/"
  - "**/__pycache__/"
  - "*.egg-info/"
  - "htmlcov/"

rule_settings:
  enable:
    - default
    # Refactorings to prioritise — logic improvements, not style
    - extract-method
    - simplify-boolean-expression
    - use-named-expression
    - remove-redundant-if
    - hoist-similar-statement-from-if
    - split-complex-comprehension
  disable:
    - use-fstring-for-formatting  # Ruff handles this
    - merge-nested-ifs            # Conflicts with SIM102 which is ignored in Ruff
    - lift-return-into-if         # Conflicts with RET rules
    - swap-if-else                # Can conflict with readability preferences
    - line-length                 # Ruff enforces 120-char limit
    - import-order                # Ruff I rules handle this
    - docstring-style             # Ruff D rules handle this
  python_version: "3.9"

# Quality threshold encodes function-length and complexity budgets.
# Sourcery blends multiple metrics (length, complexity, working memory, etc.)
# into a 0-100 score; 25 is a reasonable floor for this codebase.
metrics:
  quality_threshold: 25.0
